# Benchmark config with 10 samples (for comparing engines)

language: nl

dataset:
  provider: common_voice
  sample_size: 10
  seed: 42
  url: file:///Users/joostokkinga/Downloads/cv-corpus-24.0-2025-12-05-nl.tar.gz

engines:
  - engine: mlx_whisper
    model: mlx-community/whisper-large-v3-turbo
    enabled: true
  - engine: faster_whisper
    model: guillaumekln/faster-whisper-small
    enabled: true
  - engine: faster_whisper_large
    model: guillaumekln/faster-whisper-large-v2
    enabled: true
  - engine: whisper_cpp
    model: tiny
    enabled: true

output:
  results_dir: runs_10
  reports_dir: reports_10
  dataset_cache: dataset_cache
